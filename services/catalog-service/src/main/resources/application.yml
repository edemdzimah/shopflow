server:
  port: 8080

spring:
  application:
    name: catalog-service
  datasource:
    # These come from the Kubernetes ConfigMap and Secret at runtime.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update   # Phase 1 convenience: Hibernate creates the tables. Use migrations (Flyway) in production.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
