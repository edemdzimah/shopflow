server:
  port: 8080

spring:
  application:
    name: notifications-service

# The SQS queue this worker listens to.
order-events:
  queue-name: ${ORDER_EVENTS_QUEUE_NAME}

spring.cloud.aws:
  region:
    static: ${AWS_REGION}
  sqs:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
