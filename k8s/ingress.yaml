# The single front door. The AWS Load Balancer Controller turns this Ingress
# into an Application Load Balancer. Traffic goes to the storefront, which
# serves the web app and forwards /api/* calls to the backend services.
#
# Requires the AWS Load Balancer Controller to be installed in the cluster
# (see the README, step 3).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopflow
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: storefront
                port:
                  number: 80
