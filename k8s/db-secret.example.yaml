# Copy this file to db-secret.yaml and fill in the values you set for the
# database in Terraform. Do NOT commit db-secret.yaml.
#
# stringData lets you paste plain text; Kubernetes stores it encoded.
# In Phase 2 these move to AWS Secrets Manager via IRSA, so no password
# ever lives in a file like this.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  username: "shopflow"
  password: "REPLACE_WITH_DB_PASSWORD"
