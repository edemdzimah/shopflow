server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward catalog API calls to the Catalog service.
    # /api/catalog/products  ->  http://catalog-service:8080/products
    location /api/catalog/ {
        proxy_pass http://catalog-service:8080/;
    }

    # Forward orders API calls to the Orders service.
    # /api/orders     (POST) ->  http://orders-service:8080/orders
    # /api/orders/5   (GET)  ->  http://orders-service:8080/orders/5
    location /api/orders {
        proxy_pass http://orders-service:8080/orders;
    }

    # Everything else is the single-page app.
    location / {
        try_files $uri /index.html;
    }
}
