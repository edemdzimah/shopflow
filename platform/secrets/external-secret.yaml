# Pulls the database credentials from AWS Secrets Manager into a Kubernetes
# Secret named shopflow-db (with keys username and password), which the
# services already reference. No password is ever written in a file or chart.
#
# Uses the External Secrets Operator. See SETUP.md to install it and grant
# it read access to Secrets Manager via IRSA.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa   # the ESO service account, bound to an IAM role
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shopflow-db
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: shopflow-db          # the Kubernetes Secret that gets created
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: shopflow/db       # the secret in AWS Secrets Manager
        property: username
    - secretKey: password
      remoteRef:
        key: shopflow/db
        property: password
