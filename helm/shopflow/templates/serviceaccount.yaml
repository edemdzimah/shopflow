apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "shopflow.labels" . | nindent 4 }}
  annotations:
    # This binding is what lets the pods assume the IAM role (IRSA),
    # so they reach SQS and Secrets Manager with no static credentials.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopflow-config
  labels:
    {{- include "shopflow.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: {{ .Values.config.datasourceUrl | quote }}
  ORDER_EVENTS_QUEUE_NAME: {{ .Values.config.orderEventsQueueName | quote }}
  AWS_REGION: {{ .Values.region | quote }}
